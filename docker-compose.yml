# Local Postgres for calendar-backend. From this directory:
#   docker compose up -d
# Host port 5433 avoids clashing with a local Postgres on 5432 (Homebrew, etc.).
# Connection string matches .env.example (DATABASE_URL).
services:
  db:
    image: postgres:16-alpine
    container_name: calendar-backend-pg
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: calendar
    ports:
      - "5433:5432"
    volumes:
      - calendar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar -d calendar"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  calendar_pg_data:
